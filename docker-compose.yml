services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowmvp
      POSTGRES_PASSWORD: flowmvp
      POSTGRES_DB: flowmvp
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/server/src/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowmvp"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://flowmvp:flowmvp@postgres:5432/flowmvp
      PORT: "3100"
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
